name: Drive Ingestion System

on:
  repository_dispatch:
    types: [drive_new_file]
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Install dependencies
        run: uv sync

      - name: Run Labosphere Drive Ingestion
        run: |
          uv run labosphere ingest-drive --folder-id "${{ github.event.client_payload.folder_id }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BUZZHEAVIER_ACCOUNT_ID: ${{ secrets.BUZZHEAVIER_ACCOUNT_ID }}
          IMGBOX_SESSION_COOKIE: ${{ secrets.IMGBOX_SESSION_COOKIE }}
          
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add works/
          git commit -m "Auto-ingest: Update chapters from Google Drive" || echo "No changes to commit"
          git push
